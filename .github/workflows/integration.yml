name: Integration (live phpBB boards)

# Live tests against well-known public phpBB boards (see tests/integration/).
# NOT part of the required PR gate: they hit third-party servers, so they run
#   - weekly, to catch drift (board upgrades, WAF changes, selector rot),
#   - on demand via workflow_dispatch,
#   - on PRs only when the code they exercise changes (parser/client/tests).
# Unreachable boards SKIP rather than fail; parse regressions on reachable
# boards fail. Keep this job non-required in branch protection.

on:
  schedule:
    - cron: "17 4 * * 1" # Mondays 04:17 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "src/phpbb/**"
      - "src/config.ts"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Live integration tests
        run: npm run test:integration
